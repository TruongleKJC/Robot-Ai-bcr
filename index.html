<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROBOT AI ULTRA HACK v10.1</title>
    <style>
        :root { --neon-green: #39ff14; --neon-red: #ff0000; --neon-blue: #00f2ff; }
        body { background: #000; color: var(--neon-green); font-family: 'Courier New', Courier, monospace; margin: 0; overflow: hidden; }
        
        /* Hiệu ứng Matrix nền */
        .matrix-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.1; background: url('https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJidm95NjR6eGZ6eGZ6eGZ6eGZ6eGZ6eGZ6eGZ6eGZ6eGZ6JnB0PWFwcA/oEI9uWUicKgH6/giphy.gif'); }

        .app-frame { border: 2px solid var(--neon-green); margin: 10px; height: calc(100vh - 25px); display: flex; flex-direction: column; padding: 15px; box-shadow: inset 0 0 20px var(--neon-green); }
        
        .header { text-align: center; border-bottom: 2px solid var(--neon-green); padding-bottom: 10px; margin-bottom: 15px; }
        .header h1 { font-size: 1.2rem; margin: 0; text-shadow: 0 0 10px var(--neon-green); }
        
        .scanner-window { background: rgba(0, 50, 0, 0.3); border: 1px solid var(--neon-green); flex-grow: 1; display: flex; flex-direction: column; padding: 10px; }
        
        .side-row { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .side { width: 48%; border: 1px solid #333; padding: 5px; text-align: center; }
        .side.active { border-color: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); }
        .card-slots { display: flex; justify-content: center; gap: 5px; font-size: 1.5rem; margin-top: 10px; height: 40px; }
        
        .result-zone { text-align: center; border-top: 1px solid var(--neon-green); border-bottom: 1px solid var(--neon-green); padding: 15px 0; margin: 10px 0; background: rgba(0, 255, 0, 0.05); }
        .prediction { font-size: 1.5rem; font-weight: bold; animation: blink 1s infinite; }
        
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .keyboard { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .key { background: #000; border: 1px solid var(--neon-green); color: var(--neon-green); padding: 15px 0; font-weight: bold; cursor: pointer; }
        .key:active { background: var(--neon-green); color: #000; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        .btn { padding: 10px; border: 1px solid var(--neon-green); background: none; color: var(--neon-green); cursor: pointer; font-family: inherit; }
        .btn.active { background: var(--neon-green); color: #000; }
    </style>
</head>
<body>
    <div class="matrix-bg"></div>
    <div class="app-frame">
        <div class="header">
            <h1>SYSTEM HACK: ROBOT AI v10.1</h1>
            <small id="time"></small>
        </div>

        <div class="scanner-window">
            <div class="side-row">
                <div id="p-frame" class="side active">
                    <label>PLAYER</label>
                    <div class="card-slots" id="p-cards">-- -- --</div>
                </div>
                <div id="b-frame" class="side">
                    <label>BANKER</label>
                    <div class="card-slots" id="b-cards">-- -- --</div>
                </div>
            </div>

            <div class="result-zone">
                <div style="font-size: 0.7rem;">STATUS: ANALYZING DATA...</div>
                <div id="predict" class="prediction">WAITING...</div>
                <div id="score-detail" style="font-size: 0.8rem; margin-top: 5px;"></div>
            </div>

            <div class="keyboard">
                <button class="key" onclick="inputCard('A')">A</button>
                <button class="key" onclick="inputCard('2')">2</button>
                <button class="key" onclick="inputCard('3')">3</button>
                <button class="key" onclick="inputCard('4')">4</button>
                <button class="key" onclick="inputCard('5')">5</button>
                <button class="key" onclick="inputCard('6')">6</button>
                <button class="key" onclick="inputCard('7')">7</button>
                <button class="key" onclick="inputCard('8')">8</button>
                <button class="key" onclick="inputCard('9')">9</button>
                <button class="key" onclick="inputCard('0')">10-K</button>
            </div>

            <div class="controls">
                <button id="p-btn" class="btn active" onclick="setSide('P')">SELECT PLAYER</button>
                <button id="b-btn" class="btn" onclick="setSide('B')">SELECT BANKER</button>
                <button class="btn" style="grid-column: span 2; margin-top:5px; border-color: red; color: red;" onclick="reset()">SYSTEM RESET</button>
            </div>
        </div>
    </div>

<script>
    let pCards = [], bCards = [], currentSide = 'P';
    
    // Cập nhật thời gian hệ thống giả lập
    setInterval(() => { document.getElementById('time').innerText = "CORE_TIME: " + new Date().toLocaleTimeString(); }, 1000);

    function setSide(s) {
        currentSide = s;
        document.getElementById('p-btn').className = s === 'P' ? 'btn active' : 'btn';
        document.getElementById('b-btn').className = s === 'B' ? 'btn active' : 'btn';
        document.getElementById('p-frame').className = s === 'P' ? 'side active' : 'side';
        document.getElementById('b-frame').className = s === 'B' ? 'side active' : 'side';
    }

    function inputCard(v) {
        if (currentSide === 'P' && pCards.length < 3) pCards.push(v);
        else if (currentSide === 'B' && bCards.length < 3) bCards.push(v);
        render();
    }

    function calculate(arr) {
        let s = 0;
        arr.forEach(v => { s += (v === 'A' ? 1 : parseInt(v)); });
        return s % 10;
    }

    function render() {
        document.getElementById('p-cards').innerText = pCards.join(' ') || '-- -- --';
        document.getElementById('b-cards').innerText = bCards.join(' ') || '-- -- --';
        
        let ps = calculate(pCards), bs = calculate(bCards);
        let res = document.getElementById('predict');
        
        if (pCards.length >= 2 || bCards.length >= 2) {
            document.getElementById('score-detail').innerText = `P-CORE: ${ps} | B-CORE: ${bs}`;
            if (ps > bs) { res.innerText = "PLAYER WIN (95%)"; res.style.color = "var(--neon-blue)"; }
            else if (bs > ps) { res.innerText = "BANKER WIN (95%)"; res.style.color = "var(--neon-red)"; }
            else { res.innerText = "TIE DETECTED"; res.style.color = "yellow"; }
        }
    }

    function reset() {
        pCards = []; bCards = []; setSide('P');
        document.getElementById('predict').innerText = "WAITING...";
        document.getElementById('predict').style.color = "var(--neon-green)";
        document.getElementById('score-detail').innerText = "";
        render();
    }
</script>
</body>
    </html>
