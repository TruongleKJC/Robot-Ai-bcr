<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOST SYSTEM V2026</title>
    <style>
        :root { --neon: #39ff14; --p: #00d2ff; --b: #ff3c3c; --bg: #000; }
        body { background: var(--bg); color: var(--neon); font-family: 'Arial Black', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        
        /* Box chính */
        .container { width: 100%; max-width: 400px; border: 4px solid var(--neon); border-radius: 25px; padding: 20px; background: rgba(0, 15, 0, 0.95); box-shadow: 0 0 50px rgba(57, 255, 20, 0.4); }
        .header { text-align: center; border-bottom: 2px solid var(--neon); padding-bottom: 15px; margin-bottom: 25px; }
        .header h1 { margin: 0; font-size: 1.5rem; letter-spacing: 5px; text-transform: uppercase; }

        /* Monitor Hiển Thị */
        .monitor { background: #000; border: 2px solid #222; border-radius: 20px; padding: 40px 10px; text-align: center; margin-bottom: 25px; }
        .label { font-size: 0.8rem; letter-spacing: 4px; color: #555; margin-bottom: 15px; }
        #res { font-size: 4rem; font-weight: 900; margin: 10px 0; height: 80px; display: flex; align-items: center; justify-content: center; }
        .win-rate { font-size: 1.2rem; color: #ffd700; margin-top: 10px; }

        /* Bàn phím điều khiển */
        .grid-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-cmd { padding: 25px 0; border: none; border-radius: 15px; font-weight: 900; font-size: 1.1rem; color: white; cursor: pointer; text-transform: uppercase; transition: 0.1s; }
        .btn-p { background: var(--p); box-shadow: 0 8px 0 #0056b3; }
        .btn-b { background: var(--b); box-shadow: 0 8px 0 #8b0000; }
        .btn-cmd:active { transform: translateY(4px); box-shadow: 0 4px 0 #000; }

        .footer { text-align: center; margin-top: 25px; font-size: 0.7rem; color: #333; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>HACKER V99.9</h1>
            <div style="font-size: 0.6rem; color: #888;">CORE: ACTIVE | SẢNH: AE SEXY</div>
        </div>

        <div class="monitor">
            <div class="label">AI DỰ ĐOÁN</div>
            <div id="res">READY</div>
            <div id="rate" class="win-rate">ĐỘ CHÍNH XÁC: --%</div>
        </div>

        <div class="grid-btns">
            <button class="btn-cmd btn-p" onclick="hack('PLAYER')">PLAYER</button>
            <button class="btn-cmd btn-b" onclick="hack('BANKER')">BANKER</button>
        </div>

        <div class="footer">
            > BYPASSING SERVER... SUCCESS<br>
            <span onclick="location.reload()" style="cursor:pointer; text-decoration:underline;">RESET SYSTEM</span>
        </div>
    </div>

<script>
    function hack(type) {
        const res = document.getElementById('res');
        const rate = document.getElementById('rate');
        res.innerText = "...";
        res.style.color = "white";

        setTimeout(() => {
            let winRate = Math.floor(Math.random() * (99 - 92 + 1)) + 92;
            let prediction = (Math.random() > 0.5) ? "PLAYER" : "BANKER";
            
            res.innerText = prediction;
            res.style.color = (prediction === "PLAYER") ? "var(--p)" : "var(--b)";
            rate.innerText = "ĐỘ CHÍNH XÁC: " + winRate + "%";
        }, 500);
    }
</script>
</body>
</html>
