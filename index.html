<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROBOT AI HACKER PRO 2026</title>
    <style>
        :root { --neon: #39ff14; --p: #00f2ff; --b: #ff0055; --t: #ffeb3b; }
        body { background: #000; color: var(--neon); font-family: 'Consolas', monospace; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        /* Màn hình Boot */
        #boot-screen { position: fixed; width: 100%; height: 100%; background: #000; color: var(--neon); padding: 20px; font-size: 0.8rem; z-index: 1000; }

        /* Màn hình Nhập Mã (License) */
        #license-screen { display: none; width: 320px; border: 2px solid var(--neon); padding: 30px; text-align: center; background: rgba(0, 15, 0, 0.95); box-shadow: 0 0 30px var(--neon); z-index: 500; }
        input { width: 90%; padding: 12px; margin: 15px 0; background: #000; border: 1px solid var(--neon); color: var(--neon); text-align: center; letter-spacing: 5px; outline: none; }
        .btn-green { width: 100%; padding: 15px; background: var(--neon); color: #000; font-weight: bold; border: none; cursor: pointer; text-transform: uppercase; }

        /* Tool Chính */
        #main-tool { display: none; width: 95%; max-width: 420px; border: 2px solid var(--neon); padding: 15px; background: #000; box-shadow: 0 0 40px rgba(57, 255, 20, 0.3); }
        .monitor { border: 1px solid #333; padding: 20px; text-align: center; background: #050505; margin-bottom: 20px; position: relative; }
        .signal { font-size: 2.5rem; font-weight: bold; margin: 10px 0; text-shadow: 0 0 20px var(--neon); }
        
        .history-row { display: flex; gap: 6px; overflow-x: auto; padding: 10px 0; border-top: 1px solid #222; margin-top: 10px; }
        .ball { min-width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; color: white; font-weight: bold; border: 1px solid rgba(255,255,255,0.2); }
        
        .grid-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .card-btn { padding: 20px 0; border: 1px solid #444; background: #111; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .card-btn:active { background: #fff; color: #000; }
        .p-btn { border-color: var(--p); color: var(--p); }
        .b-btn { border-color: var(--b); color: var(--b); }
        .t-btn { border-color: var(--t); color: var(--t); }
    </style>
</head>
<body>

    <div id="boot-screen"></div>

    <div id="license-screen">
        <h2 style="margin: 0;">LICENSE REQUIRED</h2>
        <p style="font-size: 0.6rem; opacity: 0.6;">ENTER ACTIVATION KEY TO START BOT</p>
        <input type="text" id="key-input" placeholder="XXXX-XXXX">
        <button class="btn-green" onclick="checkKey()">ACTIVATE SYSTEM</button>
        <p id="error" style="color: red; font-size: 0.7rem; margin-top: 10px;"></p>
    </div>

    <div id="main-tool">
        <div style="font-size: 0.6rem; display: flex; justify-content: space-between; margin-bottom: 10px;">
            <span>STATUS: <span style="color: #00ff00;">ENCRYPTED</span></span>
            <span>USER: ADMIN_PRO_2026</span>
        </div>
        <div class="monitor">
            <div style="font-size: 0.7rem; letter-spacing: 3px; color: var(--neon);">DỰ ĐOÁN KẾT QUẢ AI</div>
            <div id="signal" class="signal">---</div>
            <div id="percent" style="color: yellow; font-size: 0.9rem;">PHÂN TÍCH: 0%</div>
            <div class="history-row" id="history"></div>
        </div>

        <div class="grid-btns">
            <button class="card-btn p-btn" onclick="send('P')">PLAYER</button>
            <button class="card-btn t-btn" onclick="send('T')">HÒA (TIE)</button>
            <button class="card-btn b-btn" onclick="send('B')">BANKER</button>
            <button class="card-btn" style="grid-column: span 3; color: red; border-color: red;" onclick="location.reload()">RESET / ĐỔI BÀN</button>
        </div>
    </div>

<script>
    // --- MÃ KÍCH HOẠT LÀ ĐÂY (Bạn có thể đổi thành số khác) ---
    const SECRET_KEY = "2026"; 

    // Hiệu ứng Boot
    const boot = document.getElementById('boot-screen');
    const logs = [
        "> Connecting to Neural Link...",
        "> Initializing AI Chipset...",
        "> Security Firewall: BYPASSED",
        "> Database: SYNCED",
        "> System: READY"
    ];
    let step = 0;
    const bootTimer = setInterval(() => {
        boot.innerHTML += logs[step] + "<br>";
        step++;
        if(step >= logs.length) {
            clearInterval(bootTimer);
            setTimeout(() => {
                boot.style.display = 'none';
                document.getElementById('license-screen').style.display = 'block';
            }, 800);
        }
    }, 500);

    // Kiểm tra Mã License
    function checkKey() {
        const input = document.getElementById('key-input').value;
        if(input === SECRET_KEY) {
            document.getElementById('license-screen').style.display = 'none';
            document.getElementById('main-tool').style.display = 'block';
        } else {
            document.getElementById('error').innerText = "MÃ SAI! VUI LÒNG LIÊN HỆ ADMIN.";
        }
    }

    let history = [];
    function send(val) {
        history.push(val);
        updateUI();
        processAI();
    }

    function updateUI() {
        const h = document.getElementById('history');
        h.innerHTML = "";
        history.forEach(v => {
            const b = document.createElement('div');
            b.className = 'ball';
            b.innerText = v;
            if(v === 'P') b.style.background = 'var(--p)';
            else if(v === 'B') b.style.background = 'var(--b)';
            else b.style.background = 'var(--t)';
            h.appendChild(b);
        });
    }

    function processAI() {
        const sig = document.getElementById('signal');
        const per = document.getElementById('percent');
        sig.innerText = "SOÁN...";
        
        setTimeout(() => {
            if(history.length < 2) {
                sig.innerText = "CHỜ BÀI";
                return;
            }
            
            let last = history[history.length - 1];
            let rate = Math.floor(Math.random() * (99 - 91)) + 91;
            let pred = "";

            // Thuật toán: Sau Hòa đánh Banker, hoặc dựa trên xu hướng cầu
            if(last === 'T') pred = "BANKER";
            else if(history.filter(x => x === 'P').length > history.filter(x => x === 'B').length) pred = "BANKER";
            else pred = "PLAYER";

            sig.innerText = pred;
            sig.style.color = (pred === "PLAYER") ? "var(--p)" : "var(--b)";
            per.innerText = "PHÂN TÍCH: " + rate + "%";
        }, 700);
    }
</script>
</body>
    </html>
