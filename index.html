<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI tài xỉu Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  background:#111;
  color:#fff;
  font-family:sans-serif;
  text-align:center;
}
.card{
  background:#1e1e1e;
  padding:12px;
  margin:10px;
  border-radius:10px;
}
button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#facc15;
  color:#000;
  font-weight:bold;
}
input,select{
  padding:5px;
  margin:5px;
}
</style>
</head>

<body>

<h2>🤖 AI TÀI XỈU PRO</h2>

<div class="card">
Vốn: <input id="money" value="1000">
Cược gốc: <input id="baseBet" value="10"><br>
<select id="strategy">
<option>Martingale</option>
<option>Fibonacci</option>
<option>AI</option>
</select>
</div>

<div class="card">
<button onclick="manual('T')">TÀI</button>
<button onclick="manual('X')">XỈU</button><br>
<button onclick="startAuto()">▶ AUTO</button>
<button onclick="stopAuto()">⏹ STOP</button>
</div>

<div class="card" id="log">---</div>

<canvas id="chart"></canvas>

<script>
let history=[];
let moneyHistory=[];
let running=false;

let bet=10;
let fib=[1,1,2,3,5,8,13,21,34];
let fibIndex=0;

// ===== FAKE API =====
async function fakeAPI(){
  return new Promise(res=>{
    setTimeout(()=>{
      res(Math.random()<0.5?'T':'X');
    },300);
  });
}

// ===== AI =====
function detectPattern(){
  let h=history.slice(-4).join('');
  if(h==='TTTT') return 'betT';
  if(h==='XXXX') return 'betX';
  if(h==='TXTX') return 'pingpong';
  if(h==='TTXX') return '22';
  return 'random';
}

function probability(){
  let t=history.filter(x=>x==='T').length;
  let x=history.length - t;
  return {
    t: t/(history.length||1),
    x: x/(history.length||1)
  };
}

function predict(){
  let pattern=detectPattern();
  let prob=probability();

  let scoreT=0;
  let scoreX=0;

  if(pattern==='betT') scoreT+=2;
  if(pattern==='betX') scoreX+=2;

  if(pattern==='pingpong'){
    let last=history.slice(-1)[0];
    return last==='T'?'X':'T';
  }

  scoreT+=prob.t;
  scoreX+=prob.x;

  return scoreT>scoreX?'T':'X';
}

// ===== GAME =====
async function play(choice){
  let result = await fakeAPI();

  let money=+document.getElementById('money').value;
  let base=+document.getElementById('baseBet').value;
  let strat=document.getElementById('strategy').value;

  let win = choice===result;

  if(win){
    money+=bet;
    if(strat==='Martingale') bet=base;
    if(strat==='Fibonacci') fibIndex=Math.max(0,fibIndex-2);
  }else{
    money-=bet;
    if(strat==='Martingale') bet*=2;
    if(strat==='Fibonacci') fibIndex++;
  }

  if(strat==='Fibonacci'){
    if(fibIndex >= fib.length) fibIndex = fib.length-1;
    bet=fib[fibIndex]*base;
  }

  // AI vốn
  if(strat==='AI'){
    if(win) bet = base*1.2;
    else bet = base*0.8;
  }

  // chống cháy
  if(money < base*5){
    stopAuto();
    alert("⚠️ Sắp cháy!");
  }

  document.getElementById('money').value=money;

  history.push(result);
  moneyHistory.push(money);

  document.getElementById('log').innerHTML =
    KQ: ${result} | Đoán: ${choice} | Bet: ${bet} | Vốn: ${money};

  updateChart();
}

// ===== AUTO =====
function autoRun(){
  if(!running) return;
  let p = predict();
  play(p);
  setTimeout(autoRun,1500);
}

function startAuto(){running=true;autoRun();}
function stopAuto(){running=false;}
function manual(c){play(c);}

// ===== CHART =====
let ctx=document.getElementById('chart');
let chart=new Chart(ctx,{
  type:'line',
  data:{
    labels:[],
    datasets:[{
      label:'Vốn',
      data:[]
    }]
  }
});

function updateChart(){
  chart.data.labels.push(history.length);
  chart.data.datasets[0].data = moneyHistory;
  chart.update();
}
</script>

</body>
</html>
