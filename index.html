<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROBOT AI ULTIMATE v18.0</title>
    <style>
        :root { --neon: #39ff14; --p: #00e5ff; --b: #ff0055; --t: #ffeb3b; --bg: #000000; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        /* Màn hình Boot (Chạy mã giả) */
        #boot-screen { position: fixed; inset: 0; background: #000; color: var(--neon); padding: 20px; font-family: monospace; font-size: 12px; z-index: 9999; }

        /* Màn hình Đăng nhập & Chọn sảnh */
        .card { width: 90%; max-width: 380px; background: #111; border: 2px solid var(--neon); border-radius: 15px; padding: 25px; box-shadow: 0 0 20px var(--neon); text-align: center; }
        h2 { color: var(--neon); text-transform: uppercase; letter-spacing: 3px; margin-top: 0; }
        select, input { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; outline: none; }
        .btn-start { width: 100%; padding: 15px; background: var(--neon); color: #000; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; }

        /* Màn hình Tool Chính */
        #tool-screen { display: none; width: 95%; max-width: 420px; }
        .main-display { background: #000; border: 2px solid var(--neon); border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 20px; box-shadow: inset 0 0 15px rgba(57, 255, 20, 0.2); }
        
        .lobby-info { font-size: 10px; color: var(--neon); text-transform: uppercase; margin-bottom: 10px; opacity: 0.8; }
        .last-val-label { font-size: 12px; color: #666; margin-top: 10px; }
        .last-val-text { font-size: 1.5rem; font-weight: bold; margin-bottom: 20px; min-height: 30px; }
        
        .predict-label { font-size: 10px; letter-spacing: 4px; color: #fff; opacity: 0.5; }
        .predict-signal { font-size: 3rem; font-weight: 900; margin: 10px 0; text-shadow: 0 0 20px var(--neon); height: 70px; display: flex; align-items: center; justify-content: center; }
        .win-rate { color: #00ff00; font-weight: bold; font-size: 14px; }

        /* Nút bấm điều khiển */
        .button-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .btn-cmd { padding: 20px 0; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: #fff; font-size: 1rem; transition: 0.2s; }
        .btn-p { background: var(--p); box-shadow: 0 6px 0 #0097a7; }
        .btn-b { background: var(--b); box-shadow: 0 6px 0 #c2185b; }
        .btn-t { background: var(--t); color: #000; box-shadow: 0 6px 0 #fbc02d; }
        .btn-cmd:active { transform: translateY(4px); box-shadow: none; }
        .btn-reset { grid-column: span 3; background: #222; margin-top: 10px; border: 1px solid #444; }
    </style>
</head>
<body>

    <div id="boot-screen"></div>

    <div id="login-card" class="card" style="display: none;">
        <h2>ROBOT AI LOGIN</h2>
        <select id="lobby-select">
            <option>AE SEXY CASINO</option>
            <option>DG CASINO</option>
            <option>EVOLUTION GAMING</option>
            <option>SA GAMING</option>
            <option>WM CASINO</option>
        </select>
        <input type="text" id="license-key" placeholder="NHẬP MÃ KÍCH HOẠT (2026)">
        <button class="btn-start" onclick="activate()">KÍCH HOẠT HỆ THỐNG</button>
        <p id="msg" style="color: red; font-size: 12px; margin-top: 10px;"></p>
    </div>

    <div id="tool-screen">
        <div class="main-display">
            <div id="active-lobby" class="lobby-info">LOBBY: --</div>
            <div class="last-val-label">VỪA NHẬP:</div>
            <div id="last-val" class="last-val-text">---</div>

            <div style="border-top: 1px solid #222; margin: 15px 0;"></div>

            <div class="predict-label">DỰ ĐOÁN VÁN KẾ</div>
            <div id="signal" class="predict-signal">READY</div>
            <div id="rate" class="win-rate">TỶ LỆ THẮNG: --%</div>
        </div>

        <div class="button-grid">
            <button class="btn-cmd btn-p" onclick="add('PLAYER')">PLAYER</button>
            <button class="btn-cmd btn-t" onclick="add('HÒA')">HÒA</button>
            <button class="btn-cmd btn-b" onclick="add('BANKER')">BANKER</button>
            <button class="btn-cmd btn-reset" onclick="location.reload()">RESET / ĐỔI SẢNH</button>
        </div>
    </div>

<script>
    // 1. Hiệu ứng khởi động
    const boot = document.getElementById('boot-screen');
    const logs = [
        "> INITIALIZING SYSTEM...",
        "> LOADING NEURAL NETWORK...",
        "> BYPASSING CASINO FIREWALL...",
        "> CONNECTION: SECURE SSL-V3",
        "> ACCESS GRANTED."
    ];
    let s = 0;
    const bootTimer = setInterval(() => {
        boot.innerHTML += logs[s] + "<br>";
        s++;
        if(s >= logs.length) {
            clearInterval(bootTimer);
            setTimeout(() => {
                boot.style.display = 'none';
                document.getElementById('login-card').style.display = 'block';
            }, 800);
        }
    }, 400);

    // 2. Kích hoạt
    function activate() {
        const key = document.getElementById('license-key').value;
        const lobby = document.getElementById('lobby-select').value;
        if(key === "2026") {
            document.getElementById('login-card').style.display = 'none';
            document.getElementById('tool-screen').style.display = 'block';
            document.getElementById('active-lobby').innerText = "LOBBY: " + lobby;
        } else {
            document.getElementById('msg').innerText = "MÃ SAI! LIÊN HỆ ADMIN.";
        }
    }

    // 3. Xử lý dữ liệu
    let history = [];
    function add(val) {
        // Hiện chữ ván vừa nhập to rõ
        const lastDisp = document.getElementById('last-val');
        lastDisp.innerText = val;
        if(val === 'PLAYER') lastDisp.style.color = 'var(--p)';
        else if(val === 'BANKER') lastDisp.style.color = 'var(--b)';
        else lastDisp.style.color = 'var(--t)';

        history.push(val);
        processAI();
    }

    function processAI() {
        const sig = document.getElementById('signal');
        const rateDisp = document.getElementById('rate');
        
        sig.innerText = "WAIT...";
        sig.style.color = "var(--neon)";

        setTimeout(() => {
            if(history.length < 2) {
                sig.innerText = "CHỜ BÀI";
                return;
            }

            let last = history[history.length - 1];
            let rate = Math.floor(Math.random() * (99 - 92 + 1)) + 92;
            let result = "";

            // Thuật toán soi cầu giả lập chuyên nghiệp
            if(last === 'HÒA') {
                result = "BANKER";
            } else if(history.filter(x => x === 'PLAYER').length > history.filter(x => x === 'BANKER').length) {
                result = "BANKER";
            } else {
                result = "PLAYER";
            }

            sig.innerText = result;
            sig.style.color = (result === "PLAYER") ? "var(--p)" : "var(--b)";
            rateDisp.innerText = "TỶ LỆ THẮNG: " + rate + "%";
        }, 600);
    }
</script>
</body>
</html>
