<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baccarat AI Scanner v60</title>
    <style>
        /* Giao diện Glassmorphism & Cyberpunk */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle, #1a1a2e, #16213e);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        h2 {
            color: #00d2ff;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.2rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00d2ff;
        }

        .video-box {
            position: relative;
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid #00d2ff;
            background: #000;
        }

        video {
            width: 100%;
            display: block;
        }

        .scanner-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(0, 210, 255, 0.7);
            box-shadow: 0 0 15px #00d2ff;
            animation: scan 2s infinite linear;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .result-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 10px;
            border-left: 3px solid #00d2ff;
        }

        .stat-card span {
            display: block;
            font-size: 0.8rem;
            color: #aaa;
        }

        .stat-card b {
            font-size: 1.2rem;
            color: #fff;
        }

        #prediction {
            grid-column: span 2;
            background: rgba(0, 210, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            color: #00d2ff;
            font-weight: bold;
            border: 1px dashed #00d2ff;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="glass-container">
        <h2>AI Baccarat Scanner v60</h2>
        
        <div class="video-box">
            <video id="camera" autoplay playsinline></video>
            <div class="scanner-line"></div>
        </div>

        <div class="result-panel">
            <div class="stat-card">
                <span>PLAYER</span>
                <b id="p-score">0</b>
            </div>
            <div class="stat-card">
                <span>BANKER</span>
                <b id="b-score">0</b>
            </div>
            <div id="prediction">CHỜ DỮ LIỆU CAMERA...</div>
        </div>

        <button onclick="startCamera()">KÍCH HOẠT CAMERA</button>
    </div>

    <script>
        const video = document.getElementById('camera');
        const pScoreText = document.getElementById('p-score');
        const bScoreText = document.getElementById('b-score');
        const predictionText = document.getElementById('prediction');

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: "environment", // Ưu tiên camera sau
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                });
                video.srcObject = stream;
                predictionText.innerText = "ĐANG PHÂN TÍCH LUỒNG VIDEO...";
                
                // Giả lập logic AI nhận diện sau khi mở cam thành công
                startAIProcessing();
            } catch (err) {
                alert("Không thể mở camera. Hãy cấp quyền truy cập!");
                console.error(err);
            }
        }

        function startAIProcessing() {
            // Đây là nơi bạn sẽ tích hợp TensorFlow.js hoặc OpenCV.js sau này
            // Hiện tại mình chạy giả lập logic tính toán để bạn thấy giao diện vận hành
            setInterval(() => {
                let pScore = Math.floor(Math.random() * 10);
                let bScore = Math.floor(Math.random() * 10);
                
                pScoreText.innerText = pScore;
                bScoreText.innerText = bScore;

                if (pScore > bScore) {
                    predictionText.innerText = "DỰ ĐOÁN: PLAYER CÓ ƯU THẾ";
                    predictionText.style.color = "#00d2ff";
                } else if (bScore > pScore) {
                    predictionText.innerText = "DỰ ĐOÁN: BANKER CÓ ƯU THẾ";
                    predictionText.style.color = "#ff4d4d";
                } else {
                    predictionText.innerText = "DỰ ĐOÁN: CỬA HÒA (TIE)";
                    predictionText.style.color = "#4dff88";
                }
            }, 3000); // Cập nhật mỗi 3 giây
        }
    </script>
</body>
</html>
