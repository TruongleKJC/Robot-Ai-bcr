<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI SOICAU PRO 2026</title>
    <style>
        * { box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { margin: 0; background: #001a1a; color: #fff; overflow-x: hidden; }

        /* --- 1. MÀN HÌNH ĐĂNG NHẬP --- */
        #login-screen {
            position: fixed; inset: 0; background: radial-gradient(circle, #003333, #000);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        .login-box { width: 300px; padding: 20px; border: 1px solid #00ffcc; border-radius: 10px; text-align: center; background: rgba(0,0,0,0.8); }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #333; color: #0f0; outline: none; }
        .btn-login { width: 100%; padding: 12px; background: #00ffcc; color: #000; border: none; font-weight: bold; cursor: pointer; }

        /* --- 2. GIAO DIỆN SẢNH (DEALER) --- */
        #lobby-screen { display: none; padding: 10px; padding-top: 50px; }
        .top-bar { position: fixed; top: 0; left: 0; right: 0; height: 50px; background: #008080; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 10; }
        
        .dealer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .dealer-card { 
            position: relative; border: 2px solid #00ffcc; border-radius: 10px; overflow: hidden; 
            cursor: pointer; height: 250px; background-size: cover; background-position: center;
        }
        .dealer-name { position: absolute; bottom: 10px; width: 100%; text-align: center; font-weight: bold; background: rgba(0,0,0,0.6); padding: 5px 0; }

        /* --- 3. BẢNG TOOL (POPUP) --- */
        #tool-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            z-index: 50; align-items: center; justify-content: center;
        }
        .tool-box {
            width: 320px; background: rgba(0, 30, 30, 0.95); border: 2px solid #00ffcc; 
            border-radius: 15px; padding: 20px; position: relative; text-align: center;
            box-shadow: 0 0 30px #00ffcc55;
        }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 20px; cursor: pointer; }
        
        .row { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; align-items: center; }
        .input-mini { width: 50px; padding: 8px; border-radius: 5px; border: none; text-align: center; font-weight: bold; }
        .btn-orange { background: #ff8c00; color: #fff; padding: 8px 25px; border-radius: 10px; border: none; font-weight: bold; }
        
        .btn-action { padding: 15px 25px; border-radius: 8px; border: none; color: #fff; font-weight: bold; cursor: pointer; flex: 1; }
        .btn-blue { background: #0055ff; border: 1px solid #fff; }
        .btn-red { background: #cc0000; border: 1px solid #fff; }
        .btn-calc { background: #fff; color: #000; width: 100px; padding: 10px; border-radius: 8px; font-weight: bold; border: 1px solid #000; }

        .nap-xu { color: #fff; font-size: 14px; text-align: left; line-height: 1.4; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2 style="color: #00ffcc; letter-spacing: 2px;">KJC SYSTEM</h2>
        <div class="login-box">
            <input type="text" id="user" placeholder="Tên đăng nhập">
            <input type="password" placeholder="Mật khẩu">
            <button class="btn-login" onclick="goLobby()">ĐĂNG NHẬP</button>
        </div>
    </div>

    <div id="lobby-screen">
        <div class="top-bar">
            <span>Xu: 0</span>
            <span style="font-size: 20px;">☰</span>
        </div>

        <div class="dealer-grid">
            <div class="dealer-card" onclick="openTool()" style="background-image: url('https://i.imgur.com/8m4YvL4.png');">
                <div class="dealer-name">DREAM GAMING</div>
            </div>
            <div class="dealer-card" onclick="openTool()" style="background-image: url('https://i.imgur.com/Y6K7v9s.png');">
                <div class="dealer-name">AE SEXY</div>
            </div>
            <div class="dealer-card" onclick="openTool()" style="background-image: url('https://i.imgur.com/L7E1rP8.png');">
                <div class="dealer-name">WM CASINO</div>
            </div>
            <div class="dealer-card" onclick="openTool()" style="background-image: url('https://i.imgur.com/9nF7A5S.png');">
                <div class="dealer-name">SA GAMING</div>
            </div>
        </div>
    </div>

    <div id="tool-overlay">
        <div class="tool-box">
            <span class="close-btn" onclick="closeTool()">×</span>
            
            <div class="row">
                <span>BÀN</span>
                <button class="btn-orange">1</button>
                <input type="text" class="input-mini" value="1">
            </div>

            <div class="row">
                <button class="btn-action btn-blue" id="p-count">CON 0</button>
                <button class="btn-action btn-red" id="b-count">CÁI 0</button>
                <div class="nap-xu">VUI LÒNG NẬP<br>XU</div>
            </div>

            <div class="row">
                <button class="btn-calc" onclick="tinh()">TÍNH TOÁN</button>
            </div>

            <div id="ketqua" style="margin-top: 10px; font-weight: bold; color: yellow;"></div>
        </div>
    </div>

<script>
    let p = 0, b = 0;

    function goLobby() {
        if(!document.getElementById('user').value) return alert("Nhập tên đăng nhập!");
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('lobby-screen').style.display = 'block';
    }

    function openTool() {
        document.getElementById('tool-overlay').style.display = 'flex';
    }

    function closeTool() {
        document.getElementById('tool-overlay').style.display = 'none';
    }

    // Logic bấm nút tăng số
    document.getElementById('p-count').onclick = function() {
        p++; this.innerText = "CON " + p;
    }
    document.getElementById('b-count').onclick = function() {
        b++; this.innerText = "CÁI " + b;
    }

    function tinh() {
        const kq = document.getElementById('ketqua');
        kq.innerText = "ĐANG PHÂN TÍCH...";
        setTimeout(() => {
            let predict = (Math.random() > 0.5) ? "VÀO CON (PLAYER)" : "VÀO CÁI (BANKER)";
            kq.innerText = "DỰ ĐOÁN: " + predict;
        }, 800);
    }
</script>
</body>
</html>
