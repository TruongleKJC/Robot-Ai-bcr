<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ORACLE V29 EXTREME</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anta&family=Oswald:wght@500;700&display=swap');
        :root { --p: #00e5ff; --b: #ff0055; --t: #00ff88; --bg: #03070c; }
        * { box-sizing: border-box; font-family: 'Anta', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: #fff; height: 100vh; overflow: hidden; }

        .app-container { height: 100vh; display: flex; flex-direction: column; padding: 15px; }
        
        /* Header Stats */
        .header-stats { display: flex; justify-content: space-between; background: rgba(255,255,255,0.03); padding: 10px 15px; border-radius: 12px; border: 1px solid #111; margin-bottom: 10px; }
        .stat-item { text-align: center; }
        .stat-label { font-size: 0.6rem; color: #555; display: block; }
        .stat-val { font-size: 0.9rem; font-weight: bold; color: var(--t); }

        /* Main Predict Area */
        .predict-card { flex: 1; background: rgba(10,15,25,0.8); border: 2px solid #1a1a1c; border-radius: 25px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; margin-bottom: 15px; overflow: hidden; }
        
        .percent-circle { width: 180px; height: 180px; border-radius: 50%; border: 8px solid #111; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; position: relative; z-index: 2; }
        #res-char { font-family: 'Oswald'; font-size: 6rem; line-height: 1; margin: 0; }
        #res-pct { font-size: 1.5rem; font-weight: bold; }

        /* 5 Input Slots */
        .slot-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; width: 100%; max-width: 300px; margin: 20px 0; }
        .slot { aspect-ratio: 1/1; background: #000; border: 1px solid #222; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: bold; color: #333; }
        .slot.active-p { border-color: var(--p); color: var(--p); box-shadow: 0 0 10px var(--p); }
        .slot.active-b { border-color: var(--b); color: var(--b); box-shadow: 0 0 10px var(--b); }

        /* Action Buttons */
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .btn { padding: 22px; border-radius: 18px; border: none; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.2s; font-family: 'Oswald'; }
        .btn-p { background: var(--p); color: #000; box-shadow: 0 0 20px rgba(0,229,255,0.3); }
        .btn-b { background: var(--b); color: #fff; box-shadow: 0 0 20px rgba(255,0,85,0.3); }
        .btn:active { transform: scale(0.92); }

        /* Wave Effect background */
        .wave-bg { position: absolute; bottom: 0; width: 100%; height: 40%; background: linear-gradient(transparent, rgba(0,229,255,0.05)); z-index: 1; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header-stats">
            <div class="stat-item"><span class="stat-label">PHIÊN THẮNG</span><span class="stat-val" id="win-count">0</span></div>
            <div class="stat-item"><span class="stat-label">TỈ LỆ THỰC</span><span class="stat-val" id="real-wr">0%</span></div>
            <div class="stat-item"><span class="stat-label">TÍN HIỆU</span><span class="stat-val" id="signal-status">READY</span></div>
        </div>

        <div class="predict-card">
            <div class="wave-bg" id="wave"></div>
            <div class="percent-circle" id="circle">
                <p id="res-char">?</p>
                <span id="res-pct">0%</span>
            </div>
            <p id="advice" style="color: #444; font-size: 0.8rem; margin-top: 15px; letter-spacing: 2px;">VUI LÒNG NHẬP DỮ LIỆU</p>
        </div>

        <div class="slot-container" id="slots">
            <div class="slot">?</div><div class="slot">?</div><div class="slot">?</div><div class="slot">?</div><div class="slot">?</div>
        </div>

        <div class="btn-group">
            <button class="btn btn-p" onclick="input(0)">PLAYER</button>
            <button class="btn btn-b" onclick="input(1)">BANKER</button>
        </div>
        
        <div style="text-align: center; margin-top: 15px;">
            <span style="color: #222; font-size: 0.6rem;">ORACLE EXTREME ENGINE V29.0</span>
        </div>
    </div>

<script>
    let data = []; let total = 0; let wins = 0; let lastPredict = '';

    function input(v) {
        // Tính WR thực tế
        if(lastPredict !== '') {
            total++;
            if(lastPredict === (v === 0 ? 'P' : 'B')) wins++;
            document.getElementById('win-count').innerText = wins;
            document.getElementById('real-wr').innerText = Math.round((wins/total)*100) + "%";
        }

        // Cập nhật 5 ô
        if(data.length >= 5) data.shift();
        data.push(v);
        renderSlots();

        // Xử lý phân tích
        if(data.length === 5) {
            const circle = document.getElementById('circle');
            const resChar = document.getElementById('res-char');
            const resPct = document.getElementById('res-pct');
            
            resChar.innerText = "...";
            document.getElementById('advice').innerText = "ANALYZING PATTERNS...";

            setTimeout(() => {
                const prob = Math.floor(Math.random() * 25 + 72); // 72% - 97%
                const side = Math.random() > 0.5 ? 0 : 1;
                lastPredict = side === 0 ? 'P' : 'B';

                resChar.innerText = lastPredict;
                resPct.innerText = prob + "%";
                
                // Hiệu ứng màu sắc mạnh
                const color = side === 0 ? 'var(--p)' : 'var(--b)';
                circle.style.borderColor = color;
                circle.style.boxShadow = `0 0 40px ${color}`;
                resChar.style.color = color;
                
                document.getElementById('advice').innerText = prob > 90 ? "LỆNH CỰC MẠNH (ALL IN)" : "LỆNH AN TOÀN (1-2%)";
                document.getElementById('advice').style.color = color;
                document.getElementById('signal-status').innerText = "STRONG";
                document.getElementById('wave').style.background = `linear-gradient(transparent, ${color}1A)`;
            }, 600);
        }
    }

    function renderSlots() {
        const slots = document.querySelectorAll('.slot');
        slots.forEach((s, i) => {
            s.className = 'slot'; s.innerText = '?';
            if(data[i] !== undefined) {
                s.innerText = data[i] === 0 ? 'P' : 'B';
                s.classList.add(data[i] === 0 ? 'active-p' : 'active-b');
            }
        });
    }
</script>
</body>
</html>
