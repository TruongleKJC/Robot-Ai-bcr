<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công Thức KJC V9.9</title>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: 'Roboto', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* App Header */
        .app-header { width: 100%; background: #2c3e50; padding: 15px 0; text-align: center; font-weight: bold; font-size: 1.1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }

        /* Bảng thống kê chuẩn 6 hàng (Bead Plate) */
        .bead-plate { background: #fff; width: 90%; max-width: 350px; height: 180px; margin: 15px 0; display: grid; grid-template-columns: repeat(12, 1fr); grid-template-rows: repeat(6, 1fr); gap: 2px; padding: 5px; box-sizing: border-box; border-radius: 5px; }
        .cell { background: #e0e0e0; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; margin: auto; }
        .cell.P { background: #007bff; color: #fff; }
        .cell.B { background: #dc3545; color: #fff; }
        .cell.T { background: #28a745; color: #fff; }

        /* Màn hình hiển thị kết quả AI */
        .ai-result { width: 90%; background: #222; border-radius: 10px; padding: 20px 0; text-align: center; margin-bottom: 20px; border: 1px solid #333; }
        .ai-label { font-size: 0.7rem; color: #aaa; margin-bottom: 10px; }
        #next-bet { font-size: 2rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
        #win-rate { font-size: 0.9rem; color: #f1c40f; margin-top: 5px; }

        /* Phím bấm điều khiển bo tròn */
        .controls { width: 90%; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .btn { padding: 15px 0; border: none; border-radius: 10px; font-weight: bold; color: #fff; font-size: 0.9rem; cursor: pointer; transition: 0.2s; box-shadow: 0 4px #000; }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px #000; }
        .btn-p { background: #007bff; }
        .btn-b { background: #dc3545; }
        .btn-t { background: #28a745; }
        .btn-clear { background: #7f8c8d; grid-column: span 3; margin-top: 10px; padding: 10px; font-size: 0.7rem; box-shadow: none; }

        .footer-note { font-size: 0.6rem; color: #555; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="app-header">CÔNG THỨC KJC PRO</div>

    <div class="bead-plate" id="board">
        </div>

    <div class="ai-result">
        <div class="ai-label">KẾT QUẢ DỰ ĐOÁN TIẾP THEO</div>
        <div id="next-bet">ĐANG ĐỢI...</div>
        <div id="win-rate">Tỷ lệ thắng: --%</div>
    </div>

    <div class="controls">
        <button class="btn btn-p" onclick="addResult('P')">PLAYER</button>
        <button class="btn btn-t" onclick="addResult('T')">HÒA</button>
        <button class="btn btn-b" onclick="addResult('B')">BANKER</button>
        <button class="btn btn-clear" onclick="resetBoard()">XÓA DỮ LIỆU CŨ</button>
    </div>

    <div class="footer-note">Hệ thống phân tích KJC AI 2026 - Không chia sẻ ra ngoài</div>

<script>
    let history = [];
    const maxCells = 72;

    function initBoard() {
        const board = document.getElementById('board');
        board.innerHTML = '';
        for (let i = 0; i < maxCells; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.id = 'cell-' + i;
            board.appendChild(cell);
        }
    }

    function addResult(type) {
        if (history.length >= maxCells) return;
        
        const currentIndex = history.length;
        history.push(type);
        
        // Cập nhật lên bảng
        const cell = document.getElementById('cell-' + currentIndex);
        cell.innerText = type;
        cell.classList.add(type);

        // Dự đoán AI
        const nextBet = document.getElementById('next-bet');
        const winRate = document.getElementById('win-rate');
        
        nextBet.innerText = "...";
        setTimeout(() => {
            // Thuật toán KJC: Dựa vào chuỗi cuối để phán
            let last = history[history.length - 1];
            let prediction = (Math.random() > 0.5) ? 'PLAYER' : 'BANKER';
            
            // Logic bệt cơ bản của KJC
            if (history.length >= 2 && history[history.length-1] === history[history.length-2]) {
                prediction = last === 'P' ? 'PLAYER' : 'BANKER';
            }

            nextBet.innerText = prediction;
            nextBet.style.color = (prediction === 'PLAYER') ? '#007bff' : '#dc3545';
            winRate.innerText = "Tỷ lệ thắng: " + (Math.floor(Math.random() * 5) + 94) + "%";
        }, 400);
    }

    function resetBoard() {
        history = [];
        initBoard();
        document.getElementById('next-bet').innerText = "ĐANG ĐỢI...";
        document.getElementById('next-bet').style.color = "#fff";
        document.getElementById('win-rate').innerText = "Tỷ lệ thắng: --%";
    }

    initBoard();
</script>
</body>
</html>
