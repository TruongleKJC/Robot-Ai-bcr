<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KJC PRO 2026</title>
    <style>
        * { box-sizing: border-box; font-family: sans-serif; }
        body { margin: 0; background: #001a1a; color: #fff; text-align: center; }
        
        /* Giao diện Sảnh Dealer */
        .lobby { padding-top: 60px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 60px 10px 10px; }
        .top-bar { position: fixed; top: 0; inset: 0 0 auto 0; height: 50px; background: #008080; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 10; cursor: pointer; }
        .card { border: 2px solid #00ffcc; border-radius: 10px; height: 200px; background: #111; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 10px; font-weight: bold; cursor: pointer; }

        /* Lớp phủ mờ nền */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
        .popup { width: 320px; background: #002b2b; border: 2px solid #00ffcc; border-radius: 15px; padding: 20px; position: relative; }
        .close { position: absolute; top: 5px; right: 12px; font-size: 25px; cursor: pointer; }

        /* Các nút đặc trưng KJC */
        .btn-orange { background: #ff8c00; color: #fff; padding: 10px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-p { background: #0055ff; color: #fff; padding: 20px; border-radius: 10px; border: 1px solid #fff; font-weight: bold; flex: 1; cursor: pointer; }
        .btn-b { background: #cc0000; color: #fff; padding: 20px; border-radius: 10px; border: 1px solid #fff; font-weight: bold; flex: 1; cursor: pointer; }
        .btn-calc { background: #fff; color: #000; width: 80%; padding: 12px; border-radius: 10px; font-weight: bold; border: none; margin-top: 15px; cursor: pointer; }

        /* Lưới chọn bàn & kết quả */
        .grid-select { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .item-num { padding: 10px; background: #111; border: 1px solid #00ffcc; border-radius: 5px; cursor: pointer; }
        .item-num:active { background: #00ffcc; color: #000; }
        
        input { width: 100%; padding: 10px; margin-top: 10px; background: #000; border: 1px solid #00ffcc; color: #fff; text-align: center; }
    </style>
</head>
<body>

    <div class="top-bar" onclick="openPopup('pop-xu')">
        <span>Xu: <b id="display-xu">0</b></span>
        <span>NẠP MÃ XU ☰</span>
    </div>

    <div class="lobby">
        <div class="card" onclick="openPopup('pop-tool')">DREAM GAMING</div>
        <div class="card" onclick="openPopup('pop-tool')">AE SEXY</div>
        <div class="card" onclick="openPopup('pop-tool')">WM CASINO</div>
        <div class="card" onclick="openPopup('pop-tool')">SA GAMING</div>
    </div>

    <div id="pop-tool" class="overlay">
        <div class="popup">
            <span class="close" onclick="closePopup('pop-tool')">×</span>
            <div style="margin-bottom: 20px;">
                BÀN <button class="btn-orange" onclick="openPopup('pop-ban')" id="cur-ban">1</button>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-p" onclick="openPopup('pop-nhap')">CON</button>
                <button class="btn-b" onclick="openPopup('pop-nhap')">CÁI</button>
            </div>
            <button class="btn-calc" onclick="tinhToan()">TÍNH TOÁN</button>
            <div id="ketqua" style="margin-top: 15px; color: #39ff14; font-weight: bold;"></div>
        </div>
    </div>

    <div id="pop-ban" class="overlay">
        <div class="popup">
            <span class="close" onclick="closePopup('pop-ban')">×</span>
            <b>CHỌN SỐ BÀN</b>
            <div class="grid-select" id="ban-list"></div>
        </div>
    </div>

    <div id="pop-nhap" class="overlay">
        <div class="popup">
            <span class="close" onclick="closePopup('pop-nhap')">×</span>
            <b>NHẬP CHUỖI KẾ QUẢ</b>
            <p style="font-size: 10px; color: #888;">Nhập chuỗi P B (Ví dụ: PPBPPB)</p>
            <input type="text" id="input-data" placeholder="Nhập dữ liệu bàn...">
            <button class="btn-calc" onclick="saveData()">XÁC NHẬN</button>
        </div>
    </div>

    <div id="pop-xu" class="overlay">
        <div class="popup">
            <span class="close" onclick="closePopup('pop-xu')">×</span>
            <b>HỆ THỐNG NẬP XU</b>
            <input type="text" id="ma-key" placeholder="Nhập mã kích hoạt (Key)">
            <button class="btn-calc" onclick="napMa()">XÁC NHẬN MÃ</button>
        </div>
    </div>

<script>
    let xu = 0;

    function openPopup(id) { document.getElementById(id).style.display = 'flex'; }
    function closePopup(id) { document.getElementById(id).style.display = 'none'; }

    // Tạo danh sách bàn 1-20
    const banList = document.getElementById('ban-list');
    for(let i=1; i<=20; i++) {
        let b = document.createElement('div');
        b.className = 'item-num';
        b.innerText = i;
        b.onclick = () => {
            document.getElementById('cur-ban').innerText = i;
            closePopup('pop-ban');
        };
        banList.appendChild(b);
    }

    function saveData() {
        alert("Đã ghi nhận dữ liệu kết quả!");
        closePopup('pop-nhap');
    }

    function napMa() {
        let key = document.getElementById('ma-key').value;
        if(key === "KJC2026") { // Mã mẫu
            xu += 500;
            document.getElementById('display-xu').innerText = xu;
            alert("Nạp thành công 500 Xu!");
            closePopup('pop-xu');
        } else {
            alert("Mã không chính xác!");
        }
    }

    function tinhToan() {
        if(xu < 50) return alert("Hết xu! Vui lòng nạp thêm.");
        let kq = document.getElementById('ketqua');
        kq.innerText = "ĐANG PHÂN TÍCH...";
        setTimeout(() => {
            xu -= 50;
            document.getElementById('display-xu').innerText = xu;
            kq.innerText = "DỰ ĐOÁN: " + (Math.random() > 0.5 ? "PLAYER (CON)" : "BANKER (CÁI)");
        }, 1000);
    }
</script>
</body>
</html>
