<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PREDICT PRO - KHÁNH</title>
    <style>
        :root { --blue: #00d2ff; --red: #ff4d4d; --gold: #ffeb3b; --bg: #050508; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; padding: 15px; }
        
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: var(--blue); font-size: 16px; letter-spacing: 2px; margin-top: 0; }

        /* Ô nhập điểm */
        .score-input { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .input-box { text-align: center; }
        .input-box label { display: block; font-size: 12px; color: #aaa; margin-bottom: 5px; }
        .input-box input { width: 80%; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; font-size: 24px; text-align: center; }

        /* Kết quả dự đoán */
        .prediction-result { background: rgba(0, 210, 255, 0.1); border: 1px dashed var(--blue); border-radius: 10px; padding: 15px; text-align: center; }
        #next-bet { font-size: 22px; font-weight: bold; color: var(--gold); margin: 5px 0; }
        #money-suggest { font-size: 14px; color: #00ffcc; }

        /* Lịch sử ván */
        .history-list { font-size: 12px; color: #888; height: 100px; overflow-y: auto; border-top: 1px solid #222; margin-top: 10px; padding-top: 10px; }
        
        button { width: 100%; padding: 15px; background: var(--blue); border: none; border-radius: 10px; color: #000; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="card">
        <h2>KẾT QUẢ VÁN VỪA RỒI</h2>
        <div class="score-input">
            <div class="input-box">
                <label>ĐIỂM CON (P)</label>
                <input type="number" id="p-score" placeholder="0-9" min="0" max="9">
            </div>
            <div class="input-box">
                <label>ĐIỂM CÁI (B)</label>
                <input type="number" id="b-score" placeholder="0-9" min="0" max="9">
            </div>
        </div>
        <button onclick="calculateNext()">PHÂN TÍCH VÁN TIẾP</button>
    </div>

    <div class="card">
        <h2>DỰ ĐOÁN THÔNG MINH</h2>
        <div class="prediction-result">
            <div id="status">CHỜ NHẬP DỮ LIỆU...</div>
            <div id="next-bet">---</div>
            <div id="money-suggest">Tiền cược: 0đ</div>
        </div>
    </div>

    <div class="card">
        <label style="font-size: 12px;">VỐN HIỆN CÓ:</label>
        <input type="number" id="total-capital" value="3000000" style="width:90%; padding:10px; background:#000; color:#fff; border:1px solid #333; border-radius:5px;">
        <div id="history" class="history-list">Lịch sử soi cầu...</div>
    </div>

    <script>
        let history = [];

        function calculateNext() {
            const p = parseInt(document.getElementById('p-score').value);
            const b = parseInt(document.getElementById('b-score').value);
            const capital = parseInt(document.getElementById('total-capital').value);

            if (isNaN(p) || isNaN(b)) {
                alert("Vui lòng nhập đủ điểm cả 2 bên!");
                return;
            }

            // Thuật toán soi cầu đơn giản (Dựa trên tổng điểm và xu hướng)
            let result = "";
            let advice = "";
            let betAmount = capital * 0.05; // Mức 5% như anh muốn

            // Logic giả lập: Nếu tổng điểm lẻ đánh Banker, chẵn đánh Player (hoặc ngược lại)
            // Anh có thể thay đổi quy tắc này tùy theo kinh nghiệm
            if ((p + b) % 2 === 0) {
                advice = "PLAYER (XANH)";
                document.getElementById('next-bet').style.color = "var(--blue)";
            } else {
                advice = "BANKER (ĐỎ)";
                document.getElementById('next-bet').style.color = "var(--red)";
            }

            // Hiển thị kết quả
            document.getElementById('status').innerText = "VÁN TIẾP THEO NÊN VÀO:";
            document.getElementById('next-bet').innerText = advice;
            document.getElementById('money-suggest').innerText = `Mức cược khuyên dùng: ${betAmount.toLocaleString()}đ (5%)`;

            // Lưu lịch sử
            const log = `P:${p} - B:${b} => Dự đoán: ${advice}`;
            history.unshift(log);
            document.getElementById('history').innerHTML = history.join("<br>");

            // Xóa ô nhập để chuẩn bị ván sau
            document.getElementById('p-score').value = "";
            document.getElementById('b-score').value = "";
        }
    </script>
</body>
</html>
