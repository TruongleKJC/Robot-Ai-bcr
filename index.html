<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Baccarat Pro AI</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: #2d2d2d; padding: 20px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .score-box { font-size: 2em; font-weight: bold; color: #ffeb3b; margin: 10px 0; }
        .suggestion { font-size: 1.2em; padding: 15px; border-radius: 8px; margin: 15px 0; font-weight: bold; }
        .wait { background: #616161; }
        .player { background: #2196f3; }
        .banker { background: #f44336; }
        input { width: 80%; padding: 10px; border-radius: 5px; border: none; margin-bottom: 10px; }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-update { background: #4caf50; color: white; }
        .btn-reset { background: #9e9e9e; color: black; margin-top: 20px; }
        .history { font-size: 0.8em; color: #bbb; margin-top: 20px; word-wrap: break-word; }
    </style>
</head>
<body>

<div class="container">
    <h2>BCR PREDICTOR AI</h2>
    <div class="score-box" id="countDisplay">0</div>
    <div id="suggestBox" class="suggestion wait">GỢI Ý: ĐANG THEO DÕI</div>
    
    <input type="text" id="cardInput" placeholder="Nhập bài (VD: 2,5,J,A)">
    <br>
    <button class="btn-update" onclick="updateTool()">CẬP NHẬT VÁN BÀI</button>
    <br>
    <button class="btn-reset" onclick="resetTool()">RESET KHAY BÀI</button>
    
    <div class="history">Lịch sử: <span id="historyDisplay">-</span></div>
</div>

<script>
    let count = 0;
    let history = [];

    function updateTool() {
        let input = document.getElementById('cardInput').value.toUpperCase();
        if (!input) return;
        
        let cards = input.split(',');
        cards.forEach(c => {
            c = c.trim();
            if (c) {
                history.push(c);
                // Thuật toán đếm bài
                if (['A', '1', '2', '3'].includes(c)) count += 1;
                else if (c === '4') count += 2;
                else if (c === '6') count -= 2;
                else if (['5', '7', '8'].includes(c)) count -= 1;
            }
        });

        document.getElementById('cardInput').value = '';
        render();
    }

    function render() {
        document.getElementById('countDisplay').innerText = count;
        document.getElementById('historyDisplay').innerText = history.join(', ');
        
        let suggestBox = document.getElementById('suggestBox');
        if (count > 5) {
            suggestBox.innerText = "GỢI Ý: ĐẶT BANKER";
            suggestBox.className = "suggestion banker";
        } else if (count < -5) {
            suggestBox.innerText = "GỢI Ý: ĐẶT PLAYER";
            suggestBox.className = "suggestion player";
        } else {
            suggestBox.innerText = "GỢI Ý: ĐANG THEO DÕI";
            suggestBox.className = "suggestion wait";
        }
    }

    function resetTool() {
        count = 0;
        history = [];
        render();
    }
</script>
</body>
</html>
