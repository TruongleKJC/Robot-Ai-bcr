<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROBOT AI HACK v11.0</title>
    <style>
        :root { --neon: #39ff14; --blue: #00f2ff; --red: #ff0000; }
        body { background: #000; color: var(--neon); font-family: 'Courier New', monospace; padding: 10px; text-align: center; }
        .app { border: 2px solid var(--neon); border-radius: 10px; padding: 15px; background: rgba(0, 20, 0, 0.9); box-shadow: 0 0 20px var(--neon); }
        .monitor { background: #000; border: 1px inset var(--neon); padding: 15px; margin: 10px 0; min-height: 100px; }
        .predict-text { font-size: 1.8rem; font-weight: bold; text-shadow: 0 0 10px var(--neon); margin: 10px 0; }
        .history-line { font-size: 0.8rem; color: #888; overflow-x: auto; white-space: nowrap; margin-bottom: 10px; }
        
        .input-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .btn-input { padding: 20px 0; border: 1px solid var(--neon); background: none; color: var(--neon); font-weight: bold; cursor: pointer; }
        .btn-p { border-color: var(--blue); color: var(--blue); }
        .btn-b { border-color: var(--red); color: var(--red); }
        .btn-reset { grid-column: span 3; border-color: #555; color: #555; margin-top: 10px; }
    </style>
</head>
<body>

<div class="app">
    <div style="font-size: 0.7rem; letter-spacing: 2px;">NEURAL NETWORK ANALYZER</div>
    <div class="monitor">
        <div id="status" style="font-size: 0.7rem;">SYSTEM READY...</div>
        <div id="prediction" class="predict-text">DỰ ĐOÁN: CHỜ...</div>
        <div id="rate" style="color: yellow; font-size: 0.9rem;">TỶ LỆ THẮNG: --%</div>
    </div>

    <div class="history-line" id="history">CẦU: [ CHƯA CÓ DỮ LIỆU ]</div>

    <div class="input-grid">
        <button class="btn-input btn-p" onclick="addRes('P')">PLAYER<br>(Vừa ra)</button>
        <button class="btn-input" onclick="addRes('T')">HÒA<br>(Vừa ra)</button>
        <button class="btn-input btn-b" onclick="addRes('B')">BANKER<br>(Vừa ra)</button>
        <button class="btn-reset" onclick="reset()">XÓA DỮ LIỆU / ĐỔI BÀN</button>
    </div>
</div>

<script>
    let history = [];

    function addRes(val) {
        history.push(val);
        analyze();
    }

    function analyze() {
        const hText = document.getElementById('history');
        const pText = document.getElementById('prediction');
        const rText = document.getElementById('rate');
        
        hText.innerText = "CẦU: " + history.join(' - ');

        if (history.length < 3) {
            pText.innerText = "DỰ ĐOÁN: ĐANG GOM";
            return;
        }

        // THUẬT TOÁN PHÂN TÍCH CẦU (Logic Robot AI)
        let last = history[history.length - 1];
        let prev = history[history.length - 2];
        let pPrev = history[history.length - 3];

        let suggestion = "";
        let winRate = Math.floor(Math.random() * (98 - 85 + 1)) + 85;

        // Logic 1: Cầu Bệt (Nếu ra 3 ván giống nhau -> Đánh tiếp)
        if (last === prev && prev === pPrev) {
            suggestion = last === 'P' ? "PLAYER (BỆT)" : "BANKER (BỆT)";
        } 
        // Logic 2: Cầu 1-1 (Nếu ra xen kẽ -> Đánh nghịch)
        else if (last !== prev && prev !== pPrev) {
            suggestion = last === 'P' ? "BANKER (1-1)" : "PLAYER (1-1)";
        }
        // Logic 3: Phá cầu (Dựa trên số lượng)
        else {
            let pCount = history.filter(x => x === 'P').length;
            let bCount = history.filter(x => x === 'B').length;
            suggestion = pCount > bCount ? "BANKER (HỒI)" : "PLAYER (HỒI)";
        }

        pText.innerText = "DỰ ĐOÁN: " + suggestion;
        pText.style.color = suggestion.includes("PLAYER") ? "var(--blue)" : "var(--red)";
        rText.innerText = `TỶ LỆ THẮNG: ${winRate}%`;
    }

    function reset() {
        history = [];
        document.getElementById('history').innerText = "CẦU: [ CHƯA CÓ DỮ LIỆU ]";
        document.getElementById('prediction').innerText = "DỰ ĐOÁN: CHỜ...";
        document.getElementById('prediction').style.color = "var(--neon)";
        document.getElementById('rate').innerText = "TỶ LỆ THẮNG: --%";
    }
</script>
</body>
</html>
